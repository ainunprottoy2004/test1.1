<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Style/style.css">
    <title>LabTask1</title>
</head>
<body>
    <div class="container">
        <form>
            <fieldset> 
                <legend>Student Information</legend>
               <table>
                    <tr>
                <td><label for="fullName">Full Name(Text): </label></td>
                <td><input type="text" id="fullName" name="fullName" placeholder="Enter Your Full Name"></td>
                <td><label for="email">Email Address: </label></td>
                <td><input type="email" id="email" name="email" placeholder="your.email@example.com"></td>
                    </tr>
                    <tr>
                <td><label for="password">Password: </label></td>
                <td><input type="password" id="password" name="password" placeholder="Enter Secure Password"></td>
                <td><label for="age">Age: </label></td>
                <td><input type="number" id="age" name="age" placeholder="Enter Your Age"></td>
                    </tr>
                    <tr>
                <td><label for="date">Experiment Date: </label></td>
                <td><input type="date" id="date" name="date"></td>            
                <td><label for="number">Phone Number(Tel): </label></td>
                <td><input type="tel" id="number" name="number"></td>
                </tr>
               </table>
            </fieldset>
            <div class="buttons">
                <input type="button" value="Submit"></input>
                <input type="button" value="Signup"></input>
            </div>
        </form>

    </div>
</body>
</html>
